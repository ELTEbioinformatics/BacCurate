# BioSample curation schema used during extraction, before standardization.
# Reviewed raw metadata "candidates" are selected based on on the listed
# attribute names and values.
schema_version: 3

# General attribute-value pairs where the values indicate
# missing information are pre-filtered based on these.
universal_missing:
  exact:
    - "-"
    - "/"
    - na
    - n/a
    - nan
    - "null"
    - none
    - nd
    - missing
    - unknown
    - unavailable
    - undetermined
    - unidentified
    - not available
    - not applicable
    - not applied
    - not collected
    - not provided
    - not known
    - not determined
    - not reported
    - not specified
    - not supplied
    - not recorded
    - no data
    - no information
    - "missing: third party data"
    - restricted access
    - withheld
    - confidential
  # These are exact corpus spellings that should not broaden the fuzzy correction.
  observed_variants:
    - unknonwn
    - unkonwn
    - unkown
    - unkwon
    - not applicabable
    - not collect
    - no collect
    - no collected
    - no applicable
  explanation_prefixes:
    - restricted access
    - withheld
    - confidential
  explanation_suffixes:
    - privacy
    - patient privacy
  fuzzy: one_edit_unique

# This is a value-only rule. Country names are exact after normalization.
location_rescue:
  vocabulary_path: ../data/reference/geo_loc_list.txt
  aliases:
    - United States
  separators:
    - ":"
    - ","

targets:
  host:
    attribute_discovery:
      host_fields:
        tokens: [host]
        phrases: [source organism]
    accepted_attributes:
      identity:
        - host
        - host_taxid
        - host_common_name
        - host_scientific_name
        - host_species
        - host_animal_breed
        - host_infra_specific_name
        - host_infra_specific_rank
        - host_subspecf_genlin
    ignored_attributes:
      properties:
        - host age
        - host disease
        - host sex
        - host health
        - host status
        - host genotype
        - host strain
        - host tissue sampled
        - host body habitat
        - host body product
        - host description
      identifiers:
        - host subject id
        - host sample
      non_host_identity:
        - lab_host
      relationship_flags:
        - host associated
        - is the sequenced pathogen host associated
      observed_non_identity:
        - host am
        - host blood press diast
        - host blood press syst
        - host body mass index
        - host body temp
        - host color
        - host dependence
        - host diet
        - host disease outcome
        - host disease stage
        - host dry mass
        - host family relationship
        - host group size
        - host growth cond
        - host health state
        - host height
        - host hiv stat
        - host housing
        - host last meal
        - host length
        - host life stage
        - host number
        - host occupation
        - host phenotype
        - host pulse
        - host shape
        - host substrate
        - host symbiont
        - host tot mass
        - host variety
    value_rejections:
      generic_non_host:
        exact: [reference, host, parent, isolate, genus, microbial, microbiology, bacteria, bacterial]
      bare_bacterial_taxon:
        exact:
          - Escherichia
          - Escherichia coli
          - E. coli
          - E coli
          - Enterococcus
          - Enterococcus faecium
          - Enterococcus faecalis
          - Staphylococcus
          - Staphylococcus aureus
          - Klebsiella
          - Klebsiella pneumoniae
          - Acinetobacter
          - Acinetobacter baumannii
          - Pseudomonas
          - Pseudomonas aeruginosa
          - Enterobacter
          - Gallionellaceae
          - Mycobacterium tuberculosis
          - Proteus mirabilis
          - Scytonema hofmannii
        fuzzy: one_edit_unique
      bare_viral_taxon:
        exact:
          - Acanthamoeba polyphaga mimivirus

  iso:
    attribute_discovery:
      physical_origin:
        tokens: [isolation, source, material, specimen, tissue]
        phrases:
          - isolated from
          - host body site
          - host body product
      environmental_origin:
        tokens: [environment, environmental, food]
    accepted_attributes:
      physical_origin:
        - isolation_source
        - lab_host
        - source_type
        - bio_material
        - tissue
        - host_tissue_sampled
        - host_body_product
        - host_body_habitat
        - host_description
        - body_product
        - farm_water_source
        - samp_source_mat_cat
        - surf_material
        # Collection-site features mostly describe environments, not geographic places.
        - coll_site_geo_feat
      environmental_origin:
        - env_broad_scale
        - env_local_scale
        - env_medium
        - env_package
        - animal_env
        - food_source
        - food_contact_surf
        - food_prod
        - food_product_type
        - food_type_processed
        - food_industry_code
        - food_industry_class
        - food_prod_synonym
        - food_prod_char
        - plant_product
        # Often complements a broad source_type with specific environmental context.
        - metagenome_source
    ignored_attributes:
      administrative:
        - biomaterial provider
        - ref biomaterial
        - library source
        - source material id
        - source name
        - isolated by
        - reference material
      identifiers:
        - isolate id
        - specimen id
        - specimen voucher
      process_and_quality:
        - climate_environment
        - season_environment
        - food_additive
        - food_pack_medium
        - food_product_qual
        - material_condition
        - food processing method
        - food quality date
        - food preserv proc
        - food contain wrap
        - food pack integrity
        - food clean proc
      non_specimen_origin:
        - food_origin
    value_rejections:
      non_discriminative_process:
        exact: [GENOMIC, Culture]

  loc:
    attribute_discovery:
      geographic_origin:
        tokens: [geo, loc, location, country, region, lat, lon, latitude, longitude]
        phrases: [collection site]
    accepted_attributes:
      place:
        - geo_loc_name
      coordinates:
        - lat_lon
    ignored_attributes:
      non_geographic_position:
        - file location
        - plasmid location
        - location type
        - location in facility
        - rel_location
        - relative location
      non_collection_geography:
        - birth_location
        - host birthplace
        - geographic location depth
        - geographic location elevation
        - samp_store_loc
      non_specimen_geography:
        - food_origin        # Describes food source, which in a lot of cases is different from sampling location
        - coll_site_geo_feat # Describes mostly isolation source

  date:
    attribute_discovery:
      dated_events:
        tokens: [date, year, time]
        phrases:
          - first public
          - last update
    accepted_attributes:
      sampling:
        - collection_date
      fallback: # Non-sampling dates share one lower-confidence fallback output.
        - submission_date
        - last_update
        - publication_date
        - cult_isol_date
        - isolation_date
        - isolation_year
        - year_isolated
        - time_of_isolation
        - extraction_date
        - DNA_extraction_date
        - sequencing_date
        - date_sequencing
        - release_date
        - ngdc_release_date
        - ena_first_public
        - ena_last_update
        - insdc_first_public
        - insdc_last_update
        - kobic_registration_date
        - kobic_release_date
        - kobic_submission_date
        - upload_date
        - UploadDate
        - received_date
        - recieved_date
        - receipt_date
        - admission_date
        - last_modified
        - first_public
        - date_for_experiment_in_lc
    ignored_attributes:
      unrelated_dates:
        - assembly date
        - passage date
        - food quality date
        - host age
        - collection date old
        - birth_date
        - death_date
        - ferm_time
        - time_since_last_wash
