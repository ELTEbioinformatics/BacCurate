prompt_version: "1"

coordinate_attributes:
  - "lat_lon"
  - "lat lon"
  - "'lat_lon'"
  - "lat"
  - "lon"
  - "geographic location (latitude)"
  - "geographic location (longitude)"
  - "latitude and longitude"
  - "latitute_and_longitude"
  - "latitude"
  - "longitude"
  - "Latitude End"
  - "Latitude Start"
  - "Longitude End"
  - "Longitude Start"
  - "geo_loc_name_coord"
  - "original geographic location (longitude)"
  - "original geographic location (latitude)"

llm_system_prompt: |
  Analyze the given text and identify its standardized country. The text can contain typos and/or abbreviations.

  General rules for standardization:
  1. If the text clearly refers to a single, valid country, return its modern, standardized short name.
  2. If the text does not refer to a country, but does mention other geographic regions, return the standardized country name based on the geographic region.
  3. If the text refers to a region that does not belong to any clear country (e.g. international waters), return the original text as "country".
  4. If the text lists multiple distinct countries, or is not interpretable as one country, return "NA" as the country.

  Respond only with a JSON object containing one non-empty string value: {"country": "<country>"}.

llm_user_prompt_template: |
    {attr_val_pairs}

# coco country_converter `name_short` -> INSDC geo_loc_name country.
# Aligns output with the INSDC Geographical Location List
# (data/reference/geo_loc_list.txt). After remapping,
# any country absent from the INSDC vocabulary is set to NA.
insdc_country_map:
  "United States": "USA"
  "Vietnam": "Viet Nam"
  "Türkiye": "Turkey"
  "DR Congo": "Democratic Republic of the Congo"
  "Cabo Verde": "Cape Verde"
  "Palestine": "State of Palestine"
  "Réunion": "Reunion"
  "Côte d'Ivoire": "Cote d’Ivoire"            # different apostrophe
  "St. Kitts and Nevis": "Saint Kitts and Nevis"
  "Congo Republic": "Republic of the Congo"
  "Svalbard and Jan Mayen Islands": "Svalbard"
  "Falkland Islands": "Falkland Islands (Islas Malvinas)"
  "Brunei Darussalam": "Brunei"
  "Curaçao": "Curacao"
  "French Southern Territories": "French Southern and Antarctic Lands"
  "Micronesia, Fed. Sts.": "Micronesia, Federated States of"
