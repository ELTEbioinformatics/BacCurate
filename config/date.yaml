# Regex parsing rules for values already identified as date candidates.
patterns:
  yyyy_mm_dd: '^\d{4}-\d{2}-\d{2}$'
  yyyy_mm_dd_slash: '^\d{4}/\d{2}/\d{2}$'
  mon_dd_yyyy: '^[A-Za-z]{3,9}\s+\d{1,2},\s*\d{4}$'
  dd_mon_yyyy: '^\d{1,2}-[A-Za-z]{3,9}-\d{4}$'
  yyyy_mm: '^\d{4}-\d{2}$'
  yyyy_mm_slash: '^\d{4}/\d{2}$'
  mm_yyyy: '^\d{2}-\d{4}$'
  mm_yyyy_slash: '^\d{2}/\d{4}$'
  mon_yyyy: '^[A-Za-z]{3,9}\s+\d{4}$'
  yyyy: '^\d{4}$'
  dd_mm_yyyy_slash: '^\d{1,2}/\d{1,2}/\d{4}$'
  dd_mm_yyyy_dash: '^\d{1,2}-\d{1,2}-\d{4}$'
  time_strip: 'T.*$'
  # Separator is restricted to '/', ' to ', or ' - ' (with spaces).
  interval: '^(?P<start>\d{4}(?:[-/A-Za-z]\w*)?(?:[-/\s]\d{1,2})?)\s*(?:/|to| - )\s*(?P<end>\d{4}(?:[-/A-Za-z]\w*)?(?:[-/\s]\d{1,2})?)$'
